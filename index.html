<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triki Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎮 Triki Games</h1>

    <div>
        <button id="connect">🔵 Connect Triki 1</button>
        <button id="connect2">🔵 Connect Triki 2</button>
        <button id="disconnect" style="background: #d9534f;">❌ Disconnect All</button>
    </div>

    <div id="status">
        🔴 Disconnected
    </div>

    <div id="menu">
        <h2>Игры</h2>
        <button class="game" id="pong">🏓 Pong</button>
        <button class="game" id="snake">🐍 Snake</button>
        <button class="game" id="toss">🎲 Toss</button>
        
        <div style="margin: 15px 0; padding: 10px; border: 1px dashed #555; border-radius: 8px;">
            <p style="margin: 0 0 8px 0; font-size: 14px; color: #ccc;">🥊 Выберите сложность силомера:</p>
            <button id="diff_easy" style="padding: 6px 12px; margin: 2px; background:#222; border:1px solid #555; color:white; cursor:pointer;">🟢 Лёгкий</button>
            <button id="diff_medium" style="padding: 6px 12px; margin: 2px; background:#222; border:1px solid #555; color:white; cursor:pointer;">🟡 Средний</button>
            <button id="diff_hard" style="padding: 6px 12px; margin: 2px; background:#333; border:3px solid #ffcc00; color:white; cursor:pointer;">🟠 Тяжелый</button>
            <button id="diff_impossible" style="padding: 6px 12px; margin: 2px; background:#222; border:1px solid #555; color:white; cursor:pointer;">🔴 Невозможный</button>
        </div>
        <button class="game" id="boxing">🥊 Запустить Силомер</button>

        <button class="game" id="frog">🐸 Crazy Frog</button>
        <button class="game" id="duel1v1" style="border-color: #ff3333;">⚔️ 1 v 1 Duel (2 Triki)</button>
    </div>

    <canvas id="game" width="900" height="500"></canvas>

    <button id="back" style="display:none;">
        ⬅ Menu
    </button>
</div>

<script src="app.js"></script>
</body>
</html>
