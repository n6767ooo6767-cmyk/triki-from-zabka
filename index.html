<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenTriki</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero">
    <h1>OpenTriki</h1>
    <p>Open source SDK для контроллера Triki от Żabka.</p>

    <button id="connect">
        Подключить Triki
    </button>

    <div id="status">
        Не подключено
    </div>
</div>

<div class="cards">

    <div class="card">
        <h2>🎮 Игры</h2>
        <p>Играй прямо в браузере.</p>
    </div>

    <div class="card">
        <h2>📡 Датчики</h2>
        <p>Просматривай данные гироскопа и акселерометра.</p>
    </div>

    <div class="card">
        <h2>🛠 API</h2>
        <p>Создавай собственные приложения.</p>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
